name: Bug report
description: Report incorrect behavior, crashes, or regressions.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, config, files, and coverage artifact shape needed to reproduce.
      placeholder: |
        parity check --config=parity.yaml --format=json
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: parity.yaml
      render: yaml
  - type: textarea
    id: output
    attributes:
      label: Output
      render: shell
  - type: input
    id: version
    attributes:
      label: Parity version
      placeholder: parity --version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: PHP 8.4, Composer 2.x, Ubuntu/macOS/Windows
