name: Release smoke

on:
  workflow_call:
    inputs:
      version:
        description: Optional tagged version to wait for on Packagist before installing.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Optional tagged version to install from Packagist, for example v1.2.3.
        required: false
        type: string
  schedule:
    - cron: '17 8 * * 1'

jobs:
  public-install:
    name: Public Packagist install
    runs-on: ubuntu-latest

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, json
          coverage: none

      - name: Resolve target version
        id: target
        run: |
          TARGET_VERSION='${{ inputs.version }}'
          if [ -z "$TARGET_VERSION" ]; then
            TARGET_VERSION='${{ github.event.inputs.version }}'
          fi

          echo "value=$TARGET_VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for Packagist package
        if: ${{ steps.target.outputs.value != '' }}
        run: |
          TARGET_VERSION='${{ steps.target.outputs.value }}'
          NORMALIZED_VERSION="${TARGET_VERSION#v}"

          for attempt in $(seq 1 30); do
            if php -r '
              $target = $argv[1];
              $json = @file_get_contents("https://repo.packagist.org/p2/testparity/parity.json");
              if ($json === false) {
                  exit(1);
              }

              $payload = json_decode($json, true);
              foreach ($payload["packages"]["testparity/parity"] ?? [] as $package) {
                  $version = ltrim((string) ($package["version"] ?? ""), "v");
                  if ($version === $target) {
                      exit(0);
                  }
              }

              exit(1);
            ' "$NORMALIZED_VERSION"; then
              echo "Packagist has version $TARGET_VERSION"
              exit 0
            fi

            echo "Packagist does not have $TARGET_VERSION yet (attempt $attempt/30); retrying in 20 seconds"
            sleep 20
          done

          echo "Timed out waiting for Packagist version $TARGET_VERSION" >&2
          exit 1

      - name: Install Parity from Packagist
        run: |
          TARGET_VERSION='${{ steps.target.outputs.value }}'
          if [ -n "$TARGET_VERSION" ]; then
            composer global require "testparity/parity:${TARGET_VERSION}" --prefer-dist --no-progress --no-interaction
          else
            composer global require testparity/parity --prefer-dist --no-progress --no-interaction
          fi
          composer global config bin-dir --absolute >> "$GITHUB_PATH"

      - name: Build temporary sample project
        run: |
          mkdir -p /tmp/parity-smoke/src /tmp/parity-smoke/tests
          cd /tmp/parity-smoke

          cat > src/InvoiceTotal.php <<'PHP'
          <?php

          final class InvoiceTotal
          {
              public function cents(array $lines): int
              {
                  return array_sum($lines);
              }
          }
          PHP

          cat > tests/InvoiceTotalTest.php <<'PHP'
          <?php

          final class InvoiceTotalTest
          {
              public function coversPrimaryBehavior(): void
              {
              }
          }
          PHP

          cat > parity-coverage.json <<'JSON'
          {
            "version": 1,
            "globalPercent": 100,
            "files": [
              {
                "path": "src/InvoiceTotal.php",
                "coveragePercent": 100,
                "totalExecutableLines": 3,
                "lines": [
                  { "line": 5, "coveredBy": ["InvoiceTotalTest::coversPrimaryBehavior"] },
                  { "line": 6, "coveredBy": ["InvoiceTotalTest::coversPrimaryBehavior"] },
                  { "line": 7, "coveredBy": ["InvoiceTotalTest::coversPrimaryBehavior"] }
                ]
              }
            ]
          }
          JSON

          cat > parity.yaml <<'YAML'
          settings:
            namespace_roots:
              src: App
              tests: Tests
            source_extension: ".php"
            test_suffix: "Test"
            test_extension: ".php"
            namespace_separator: "\\"

          coverage_xml: [parity-coverage.json, coverage-xml, clover.xml, cobertura.xml]
          min_coverage: 90
          min_coverage_global: 90
          min_matched_coverage: 90

          structure:
            - name: "Smoke"
              paths:
                source: "src"
                test: "tests"
              rules:
                - minimum-coverage:
                    min: 90
                - matched-coverage:
                    min: 90
                - coverage-attribution
          YAML

      - name: Run installed Parity
        working-directory: /tmp/parity-smoke
        run: |
          parity --version
          parity check --format=json
