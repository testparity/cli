name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, fileinfo, json
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-php-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-php-8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pint
        run: ./vendor/bin/pint --test

      - name: Run Pest
        run: XDEBUG_MODE=coverage ./vendor/bin/pest --coverage-xml=coverage-xml --coverage-clover=clover.xml --colors=never

      - name: Run Parity on Parity
        run: php parity check --format=json

      - name: Build PHAR
        run: |
          mkdir -p vendor/humbug/php-scoper/vendor-hotfix
          echo "<?php // vendor-hotfix placeholder" > vendor/humbug/php-scoper/vendor-hotfix/placeholder.php
          git describe --tags --abbrev=0 > VERSION || printf "0.0.0-dev\n" > VERSION
          ./vendor/bin/box compile --no-interaction
          ls -la parity.phar 2>/dev/null || echo "PHAR build attempted"
        env:
          BOX_CACHE_ENABLED: false

      - name: Verify PHAR
        if: runner.os == 'Linux'
        run: |
          chmod +x parity.phar
          ./parity.phar --version
          ./parity.phar check --format=json
