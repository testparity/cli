settings:
  namespace_roots:
    app: App
    tests: Tests
  source_extension: ".ts"
  test_suffix: ".spec"
  test_extension: ".ts"
  namespace_separator: "."

coverage_xml: clover.xml
min_coverage: 80

structure:
  - name: "AdonisJS Services"
    paths:
      source: "app/services"
      test: "tests/unit/services"
    rules:
      - minimum-coverage:
          min: 80
