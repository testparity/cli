settings:
  namespace_roots:
    code/src: Src
    code/tests: Tests
  source_extension: ".js"
  test_suffix: ".test"
  test_extension: ".js"
  namespace_separator: "."

coverage_xml: code/clover.xml
min_coverage: 80

structure:
  - name: "Jest sample"
    paths:
      source: "code/src"
      test: "code/tests"
    rules:
      - minimum-coverage:
          min: 80
